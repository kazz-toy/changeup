<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>チェンジアップ練習用メトロノーム</title>
  <style>
    :root{
      --bg:#111;
      --panel:#1b1b1b;
      --panel2:#202020;
      --text:#f4f4f4;
      --muted:#8a8a8a;
      --dot:#555;
      --active:#35ff7a;
      --line:#ff4d4d;
      --accent:#ffaa00;
      --border:#333;
      --danger:#ff6b6b;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(100%, 520px);
      padding:16px 14px 28px;
    }
    h1{
      margin:0 0 14px;
      font-size:1.25rem;
      text-align:center;
    }
    .controls{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }
    .control-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .control-row{
      display:grid;
      gap:10px;
    }
    .field{
      display:grid;
      gap:6px;
    }
    .field label{
      font-size:0.92rem;
      color:#ddd;
      font-weight:700;
    }
    select, button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:1rem;
      background:#2b2b2b;
      color:var(--text);
      -webkit-appearance:none;
      appearance:none;
    }
    select{
      border:1px solid #3a3a3a;
    }
    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    button{
      font-weight:800;
      cursor:pointer;
    }
    #startBtn{ background:#2a4d31; }
    #stopBtn{ background:#4a2d2d; }
    #startBtn:active{ transform:scale(0.99); }
    #stopBtn:active{ transform:scale(0.99); }

    .display-card{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
    }

    .main-title, .second-title{
      text-align:center;
      font-weight:800;
      margin-bottom:8px;
      color:#ddd;
    }

    .main-visual-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:8px;
    }
    canvas#mainCanvas{
      display:block;
      width:min(82vw, 320px);
      height:min(82vw, 320px);
      max-width:320px;
      max-height:320px;
      background:#161616;
      border:1px solid #2f2f2f;
      border-radius:18px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .second-visual{
      position:relative;
      height:64px;
      border-radius:12px;
      background:#161616;
      border:1px solid #2f2f2f;
      overflow:hidden;
    }
    .second-line{
      position:absolute;
      top:10px;
      width:4px;
      height:44px;
      background:var(--line);
      box-shadow:0 0 14px rgba(255,77,77,0.95);
      border-radius:2px;
      transition:none;
      left:12px;
      opacity:0.18;
    }
    .second-label-left, .second-label-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:0.8rem;
      color:#ff9a9a;
      opacity:0.85;
      user-select:none;
      pointer-events:none;
    }
    .second-label-left{ left:18px; }
    .second-label-right{ right:18px; }

    .status{
      margin-top:12px;
      background:#181818;
      border:1px solid #2e2e2e;
      border-radius:12px;
      padding:10px 12px;
      line-height:1.7;
      min-height:88px;
    }
    .status-line{
      font-size:0.98rem;
      font-weight:700;
    }
    .muted{
      color:var(--muted);
      font-size:0.85rem;
      margin-top:8px;
      text-align:center;
    }

    @media (min-width: 420px){
      .control-row{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>チェンジアップ練習用メトロノーム</h1>

    <div class="controls">
      <div class="control-card">
        <div class="control-row">
          <div class="field">
            <label for="patternSelect">第1パターン</label>
            <select id="patternSelect">
              <option value="1">パターン1（4→8→3連→16→6→32→6→16→3連→8）</option>
              <option value="2">パターン2（4→8→3連→16→6→16→3連→8）</option>
              <option value="3">パターン3（3連→6連）</option>
            </select>
          </div>
          <div class="field">
            <label for="measureSelect">各音符の小節数</label>
            <select id="measureSelect">
              <option value="1">1小節</option>
              <option value="2">2小節</option>
              <option value="3">3小節</option>
              <option value="4">4小節</option>
              <option value="8">8小節</option>
            </select>
          </div>
          <div class="field">
            <label for="bpmSelect">BPM</label>
            <select id="bpmSelect"></select>
          </div>
        </div>

        <div class="buttons">
          <button id="startBtn">スタート</button>
          <button id="stopBtn">ストップ</button>
        </div>
      </div>
    </div>

    <div class="display-card">
      <div class="main-title">第1（手 / スネア）</div>
      <div class="main-visual-wrap">
        <canvas id="mainCanvas" width="320" height="320"></canvas>
      </div>
    </div>

    <div class="display-card">
      <div class="second-title">第2（バスドラ + ハイハット / 8分固定）</div>
      <div class="second-visual" id="secondVisual">
        <div class="second-label-left">HH</div>
        <div class="second-label-right">BD</div>
        <div class="second-line" id="secondLine"></div>
      </div>

      <div class="status" id="statusBox">
        <div class="status-line" id="statusRun">停止中</div>
        <div class="status-line" id="statusRhythm">第1: 4分音符</div>
        <div class="status-line" id="statusMeasure">1/1小節</div>
        <div class="status-line" id="statusBeat">拍1/4</div>
      </div>

      <div class="muted">スタート直後のみ、1小節のプリカウントが入ります。</div>
    </div>
  </div>

  <script>
    const PATTERNS = {
      1: [1, 2, 3, 4, 6, 8, 6, 4, 3, 2],
      2: [1, 2, 3, 4, 6, 4, 3, 2],
      3: [3, 6]
    };

    const RHYTHM_LABEL = {
      1: "4分音符",
      2: "8分音符",
      3: "3連符",
      4: "16分音符",
      6: "6連符",
      8: "32分音符"
    };

    const CLOCK_ANGLES = {
      1: [-90],
      2: [-90, 90],
      3: [-90, 30, 150],
      4: [-90, 0, 90, 180],
      6: [-90, -30, 30, 90, 150, 210],
      8: [-90, -45, 0, 45, 90, 135, 180, 225]
    };

    const patternSelect = document.getElementById("patternSelect");
    const measureSelect = document.getElementById("measureSelect");
    const bpmSelect = document.getElementById("bpmSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    const mainCanvas = document.getElementById("mainCanvas");
    const ctx = mainCanvas.getContext("2d");

    const secondVisual = document.getElementById("secondVisual");
    const secondLine = document.getElementById("secondLine");

    const statusRun = document.getElementById("statusRun");
    const statusRhythm = document.getElementById("statusRhythm");
    const statusMeasure = document.getElementById("statusMeasure");
    const statusBeat = document.getElementById("statusBeat");

    for (let i = 20; i <= 200; i++) {
      const op = document.createElement("option");
      op.value = String(i);
      op.textContent = String(i);
      if (i === 70) op.selected = true;
      bpmSelect.appendChild(op);
    }

    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    async function resumeAudio() {
      const ctx = ensureAudio();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
      return ctx;
    }

    function scheduleClick(time, isAccent, isSecond) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";

      const freq = isSecond
        ? (isAccent ? 800 : 400)
        : (isAccent ? 1000 : 600);

      const peak = isSecond
        ? (isAccent ? 0.20 : 0.13)
        : (isAccent ? 0.12 : 0.08);

      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(peak, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);

      osc.start(time);
      osc.stop(time + 0.08);
    }

    let running = false;
    let rafId = 0;
    let schedulerId = 0;

    let nextMainTime = 0;
    let nextSecondTime = 0;
    let scheduleAhead = 0.12;
    let lookaheadMs = 25;

    let mode = "stopped";

    let stepIndex = 0;
    let measureInStep = 1;
    let beatInBar = 1;
    let mainSubIndex = 0;

    let secondSubIndex = 0;
    let precountBeat = 1;

    let activeMain = {
      subdivision: 1,
      subIndex: -1,
      onUntil: 0
    };
    let activeSecond = {
      index: -1,
      onUntil: 0
    };

    const dueVisualEvents = [];
    const dueStatusEvents = [];

    function getMeasuresPerStep() {
      return parseInt(measureSelect.value, 10);
    }

    function getPatternArray() {
      return PATTERNS[patternSelect.value];
    }

    function resetMainState() {
      stepIndex = 0;
      measureInStep = 1;
      beatInBar = 1;
      mainSubIndex = 0;
      secondSubIndex = 0;
    }

    function setStatus(runText, rhythmText, measureText, beatText) {
      statusRun.textContent = runText;
      statusRhythm.textContent = rhythmText;
      statusMeasure.textContent = measureText;
      statusBeat.textContent = beatText;
    }

    function advanceMainStepIfNeeded() {
      const measuresPerStep = getMeasuresPerStep();

      beatInBar++;
      if (beatInBar > 4) {
        beatInBar = 1;
        measureInStep++;
        if (measureInStep > measuresPerStep) {
          measureInStep = 1;
          stepIndex++;
          if (stepIndex >= getPatternArray().length) {
            stepIndex = 0;
          }
        }
      }
    }

    function queueMainStatusEvent(time, subdivision, measureNow, measuresPerStep, beatNow) {
      dueStatusEvents.push({
        time,
        runningText: "再生中",
        rhythmText: `第1: ${RHYTHM_LABEL[subdivision]}`,
        measureText: `${measureNow}/${measuresPerStep}小節`,
        beatText: `拍${beatNow}/4`
      });
    }

    function queuePrecountStatusEvent(time, beatNow) {
      dueStatusEvents.push({
        time,
        runningText: "再生中（プリカウント）",
        rhythmText: "第1: 4分音符",
        measureText: "1/1小節",
        beatText: `拍${beatNow}/4`
      });
    }

    function schedulePrecountEvents(now) {
      const beatDur = 60 / parseInt(bpmSelect.value, 10);
      while (nextMainTime < now + scheduleAhead && mode === "precount") {
        const beatNow = precountBeat;
        const accent = (beatNow === 1);

        scheduleClick(nextMainTime, accent, false);

        dueVisualEvents.push({
          time: nextMainTime,
          kind: "main",
          subdivision: 1,
          subIndex: 0,
          onUntil: nextMainTime + Math.min(0.12, beatDur * 0.7)
        });

        queuePrecountStatusEvent(nextMainTime, beatNow);

        precountBeat++;
        if (precountBeat > 4) {
          mode = "main";
          resetMainState();
          nextMainTime += beatDur;
          nextSecondTime = nextMainTime;
          break;
        } else {
          nextMainTime += beatDur;
        }
      }
    }

    function scheduleMainEvents(now) {
      const bpm = parseInt(bpmSelect.value, 10);
      const beatDur = 60 / bpm;
      const secondDur = beatDur / 2;

      while (mode === "main" && (
        nextMainTime < now + scheduleAhead ||
        nextSecondTime < now + scheduleAhead
      )) {
        if (nextMainTime <= nextSecondTime) {
          const subdivision = getPatternArray()[stepIndex];
          const subDur = beatDur / subdivision;

          const currentTime = nextMainTime;
          const currentSubIndex = mainSubIndex;
          const currentBeat = beatInBar;
          const currentMeasure = measureInStep;
          const measuresPerStep = getMeasuresPerStep();

          const isBeatHead = (currentSubIndex === 0);
          const isAccent = (currentSubIndex === 0);

          scheduleClick(currentTime, isAccent, false);

          dueVisualEvents.push({
            time: currentTime,
            kind: "main",
            subdivision,
            subIndex: currentSubIndex,
            onUntil: currentTime + Math.min(0.10, subDur * 0.75)
          });

          if (isBeatHead) {
            queueMainStatusEvent(
              currentTime,
              subdivision,
              currentMeasure,
              measuresPerStep,
              currentBeat
            );
          }

          mainSubIndex++;
          if (mainSubIndex >= subdivision) {
            mainSubIndex = 0;
            advanceMainStepIfNeeded();
          }

          nextMainTime += subDur;
        } else {
          const currentTime = nextSecondTime;
          const idx = secondSubIndex;
          const isAccent = (idx === 0);

          scheduleClick(currentTime, isAccent, true);

          dueVisualEvents.push({
            time: currentTime,
            kind: "second",
            secondIndex: idx,
            onUntil: currentTime + Math.min(0.035, secondDur * 0.22)
          });

          secondSubIndex = (secondSubIndex + 1) % 2;
          nextSecondTime += secondDur;
        }
      }
    }

    function processDueEvents(now) {
      while (dueVisualEvents.length && dueVisualEvents[0].time <= now) {
        const ev = dueVisualEvents.shift();
        if (ev.kind === "main") {
          activeMain.subdivision = ev.subdivision;
          activeMain.subIndex = ev.subIndex;
          activeMain.onUntil = ev.onUntil;
        } else if (ev.kind === "second") {
          activeSecond.index = ev.secondIndex;
          activeSecond.onUntil = ev.onUntil;
        }
      }

      while (dueStatusEvents.length && dueStatusEvents[0].time <= now) {
        const ev = dueStatusEvents.shift();
        setStatus(ev.runningText, ev.rhythmText, ev.measureText, ev.beatText);
      }

      if (activeMain.onUntil <= now) {
        activeMain.subIndex = -1;
      }
      if (activeSecond.onUntil <= now) {
        activeSecond.index = -1;
      }
    }

    function schedulerLoop() {
      if (!running || !audioCtx) return;
      const now = audioCtx.currentTime;

      if (mode === "precount") {
        schedulePrecountEvents(now);
      }
      if (mode === "main") {
        scheduleMainEvents(now);
      }
    }

    function drawClockFace() {
      const w = mainCanvas.width;
      const h = mainCanvas.height;
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const radius = 104;

      ctx.beginPath();
      ctx.arc(cx, cy, radius + 18, 0, Math.PI * 2);
      ctx.strokeStyle = "#303030";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = "#888";
      ctx.fill();

      const subdivision = activeMain.subdivision || 1;
      const angles = CLOCK_ANGLES[subdivision];

      for (let i = 0; i < angles.length; i++) {
        const rad = angles[i] * Math.PI / 180;
        const x = cx + Math.cos(rad) * radius;
        const y = cy + Math.sin(rad) * radius;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 2;
        ctx.stroke();

        const isActive = (i === activeMain.subIndex);
        ctx.beginPath();
        ctx.arc(x, y, 13, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "#35ff7a" : "#5a5a5a";
        ctx.shadowColor = isActive ? "#35ff7a" : "transparent";
        ctx.shadowBlur = isActive ? 18 : 0;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.08)";
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(cx, cy - (radius + 18), 3, 0, Math.PI * 2);
      ctx.fillStyle = "#c8c8c8";
      ctx.fill();
    }

    function drawSecondLine() {
      const boxWidth = secondVisual.clientWidth;
      const pad = 12;
      const rightX = boxWidth - pad - secondLine.offsetWidth;
      const leftX = pad;

      let x = leftX;
      if (activeSecond.index === 0) {
        x = rightX;
      } else if (activeSecond.index === 1) {
        x = leftX;
      } else {
        const prev = parseFloat(secondLine.dataset.x || String(leftX));
        x = Number.isFinite(prev) ? prev : leftX;
      }

      secondLine.style.left = `${x}px`;
      secondLine.dataset.x = String(x);
      secondLine.style.opacity = activeSecond.index === -1 ? "0.06" : "1";
      secondLine.style.boxShadow = activeSecond.index === -1
        ? "0 0 0 rgba(255,77,77,0)"
        : "0 0 16px rgba(255,77,77,1)";
    }

    function renderLoop() {
      if (!running || !audioCtx) return;
      const now = audioCtx.currentTime;

      processDueEvents(now);
      drawClockFace();
      drawSecondLine();

      rafId = requestAnimationFrame(renderLoop);
    }

    async function start() {
      await resumeAudio();

      stop(true);

      running = true;
      mode = "precount";
      precountBeat = 1;
      resetMainState();

      const now = audioCtx.currentTime;
      const startLead = 0.08;
      nextMainTime = now + startLead;
      nextSecondTime = now + startLead;

      dueVisualEvents.length = 0;
      dueStatusEvents.length = 0;

      activeMain = { subdivision: 1, subIndex: -1, onUntil: 0 };
      activeSecond = { index: -1, onUntil: 0 };

      setStatus("再生中（プリカウント）", "第1: 4分音符", "1/1小節", "拍1/4");

      schedulerId = setInterval(schedulerLoop, lookaheadMs);
      schedulerLoop();
      renderLoop();
    }

    function stop(silent = false) {
      running = false;
      mode = "stopped";

      if (schedulerId) {
        clearInterval(schedulerId);
        schedulerId = 0;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }

      dueVisualEvents.length = 0;
      dueStatusEvents.length = 0;

      activeMain = {
        subdivision: getPatternArray()[0],
        subIndex: -1,
        onUntil: 0
      };
      activeSecond = {
        index: -1,
        onUntil: 0
      };

      drawClockFace();
      drawSecondLine();

      if (!silent) {
        setStatus(
          "停止中",
          `第1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}小節`,
          "拍1/4"
        );
      }
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", () => stop(false));

    patternSelect.addEventListener("change", () => {
      if (!running) {
        activeMain.subdivision = getPatternArray()[0];
        activeMain.subIndex = -1;
        drawClockFace();
        setStatus(
          "停止中",
          `第1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}小節`,
          "拍1/4"
        );
      }
    });

    measureSelect.addEventListener("change", () => {
      if (!running) {
        setStatus(
          "停止中",
          `第1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}小節`,
          "拍1/4"
        );
      }
    });

    bpmSelect.addEventListener("change", () => {});

    window.addEventListener("resize", () => {
      drawClockFace();
      drawSecondLine();
    });

    activeMain.subdivision = getPatternArray()[0];
    drawClockFace();
    drawSecondLine();
    setStatus("停止中", `第1: ${RHYTHM_LABEL[getPatternArray()[0]]}`, `1/${getMeasuresPerStep()}小節`, "拍1/4");
  </script>
</body>
</html>
