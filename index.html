<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>гғҒгӮ§гғігӮёгӮўгғғгғ—з·ҙзҝ’з”ЁгғЎгғҲгғӯгғҺгғјгғ </title>
  <style>
    :root{
      --bg:#111;
      --panel:#1b1b1b;
      --panel2:#202020;
      --text:#f4f4f4;
      --muted:#8a8a8a;
      --dot:#555;
      --active:#35ff7a;
      --line:#17d7ff;
      --accent:#ffaa00;
      --border:#333;
      --danger:#ff6b6b;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(100%, 520px);
      padding:16px 14px 28px;
    }
    h1{
      margin:0 0 14px;
      font-size:1.25rem;
      text-align:center;
    }
    .controls{
      display:grid;
      gap:10px;
      margin-bottom:14px;
    }
    .control-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .control-row{
      display:grid;
      gap:10px;
    }
    .field{
      display:grid;
      gap:6px;
    }
    .field label{
      font-size:0.92rem;
      color:#ddd;
      font-weight:700;
    }
    select, button{
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:1rem;
      background:#2b2b2b;
      color:var(--text);
      -webkit-appearance:none;
      appearance:none;
    }
    select{
      border:1px solid #3a3a3a;
    }
    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    button{
      font-weight:800;
      cursor:pointer;
    }
    #startBtn{ background:#2a4d31; }
    #stopBtn{ background:#4a2d2d; }
    #startBtn:active{ transform:scale(0.99); }
    #stopBtn:active{ transform:scale(0.99); }

    .display-card{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
    }

    .main-title, .second-title{
      text-align:center;
      font-weight:800;
      margin-bottom:8px;
      color:#ddd;
    }

    /* з¬¬1пјҡжӯЈж–№еҪўеҜ„гӮҠ */
    .main-visual-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:8px;
    }
    canvas#mainCanvas{
      display:block;
      width:min(82vw, 320px);
      height:min(82vw, 320px);
      max-width:320px;
      max-height:320px;
      background:#161616;
      border:1px solid #2f2f2f;
      border-radius:18px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    /* з¬¬2пјҡзёҰе№…зҹӯгӮҒ */
    .second-visual{
      position:relative;
      height:64px;
      border-radius:12px;
      background:#161616;
      border:1px solid #2f2f2f;
      overflow:hidden;
    }
    .second-line{
      position:absolute;
      top:10px;
      width:4px;
      height:44px;
      background:var(--line);
      box-shadow:0 0 12px rgba(23,215,255,0.75);
      border-radius:2px;
      transition:none;
      left:12px;
    }
    .second-label-left, .second-label-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:0.8rem;
      color:#9adff0;
      opacity:0.8;
      user-select:none;
      pointer-events:none;
    }
    .second-label-left{ left:18px; }
    .second-label-right{ right:18px; }

    .status{
      margin-top:12px;
      background:#181818;
      border:1px solid #2e2e2e;
      border-radius:12px;
      padding:10px 12px;
      line-height:1.7;
      min-height:88px;
    }
    .status-line{
      font-size:0.98rem;
      font-weight:700;
    }
    .muted{
      color:var(--muted);
      font-size:0.85rem;
      margin-top:8px;
      text-align:center;
    }

    @media (min-width: 420px){
      .control-row{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>гғҒгӮ§гғігӮёгӮўгғғгғ—з·ҙзҝ’з”ЁгғЎгғҲгғӯгғҺгғјгғ </h1>

    <div class="controls">
      <div class="control-card">
        <div class="control-row">
          <div class="field">
            <label for="patternSelect">з¬¬1гғ‘гӮҝгғјгғі</label>
            <select id="patternSelect">
              <option value="1">гғ‘гӮҝгғјгғі1пјҲ4вҶ’8вҶ’3йҖЈвҶ’16вҶ’6вҶ’32вҶ’6вҶ’16вҶ’3йҖЈвҶ’8пјү</option>
              <option value="2">гғ‘гӮҝгғјгғі2пјҲ4вҶ’8вҶ’3йҖЈвҶ’16вҶ’6вҶ’16вҶ’3йҖЈвҶ’8пјү</option>
            </select>
          </div>
          <div class="field">
            <label for="measureSelect">еҗ„йҹіз¬ҰгҒ®е°ҸзҜҖж•°</label>
            <select id="measureSelect">
              <option value="1">1е°ҸзҜҖ</option>
              <option value="2">2е°ҸзҜҖ</option>
              <option value="3">3е°ҸзҜҖ</option>
              <option value="4">4е°ҸзҜҖ</option>
            </select>
          </div>
          <div class="field">
            <label for="bpmSelect">BPM</label>
            <select id="bpmSelect"></select>
          </div>
        </div>

        <div class="buttons">
          <button id="startBtn">гӮ№гӮҝгғјгғҲ</button>
          <button id="stopBtn">гӮ№гғҲгғғгғ—</button>
        </div>
      </div>
    </div>

    <div class="display-card">
      <div class="main-title">з¬¬1пјҲжүӢ / гӮ№гғҚгӮўпјү</div>
      <div class="main-visual-wrap">
        <canvas id="mainCanvas" width="320" height="320"></canvas>
      </div>
    </div>

    <div class="display-card">
      <div class="second-title">з¬¬2пјҲгғҗгӮ№гғүгғ© + гғҸгӮӨгғҸгғғгғҲ / 8еҲҶеӣәе®ҡпјү</div>
      <div class="second-visual" id="secondVisual">
        <div class="second-label-left">HH</div>
        <div class="second-label-right">BD</div>
        <div class="second-line" id="secondLine"></div>
      </div>

      <div class="status" id="statusBox">
        <div class="status-line" id="statusRun">еҒңжӯўдёӯ</div>
        <div class="status-line" id="statusRhythm">з¬¬1: 4еҲҶйҹіз¬Ұ</div>
        <div class="status-line" id="statusMeasure">1/1е°ҸзҜҖ</div>
        <div class="status-line" id="statusBeat">жӢҚ1/4</div>
      </div>

      <div class="muted">гӮ№гӮҝгғјгғҲзӣҙеҫҢгҒ®гҒҝгҖҒ1е°ҸзҜҖгҒ®гғ—гғӘгӮ«гӮҰгғігғҲгҒҢе…ҘгӮҠгҒҫгҒҷгҖӮ</div>
    </div>
  </div>

  <script>
    // ===== еҹәжң¬иЁӯе®ҡ =====
    const PATTERNS = {
      1: [1, 2, 3, 4, 6, 8, 6, 4, 3, 2],
      2: [1, 2, 3, 4, 6, 4, 3, 2]
    };

    const RHYTHM_LABEL = {
      1: "4еҲҶйҹіз¬Ұ",
      2: "8еҲҶйҹіз¬Ұ",
      3: "3йҖЈз¬Ұ",
      4: "16еҲҶйҹіз¬Ұ",
      6: "6йҖЈз¬Ұ",
      8: "32еҲҶйҹіз¬Ұ"
    };

    // жҷӮиЁҲж–Үеӯ—зӣӨй…ҚзҪ®пјҲ12жҷӮ=дёҠпјү
    // и§’еәҰгҒҜеәҰж•°гҖӮ-90 гҒҢ12жҷӮгҖӮ
    const CLOCK_ANGLES = {
      1: [-90],                            // 12жҷӮ
      2: [-90, 90],                        // 12жҷӮ, 6жҷӮ
      3: [-90, 30, 150],                   // 12жҷӮ, 4жҷӮ, 8жҷӮ
      4: [-90, 0, 90, 180],                // 12жҷӮ, 3жҷӮ, 6жҷӮ, 9жҷӮ
      6: [-90, -30, 30, 90, 150, 210],     // 12жҷӮ, 2жҷӮ, 4жҷӮ, 6жҷӮ, 8жҷӮ, 10жҷӮ
      8: [-90, -45, 0, 45, 90, 135, 180, 225] // 12, 1:30, 3, 4:30, 6, 7:30, 9, 10:30
    };

    // ===== DOM =====
    const patternSelect = document.getElementById("patternSelect");
    const measureSelect = document.getElementById("measureSelect");
    const bpmSelect = document.getElementById("bpmSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    const mainCanvas = document.getElementById("mainCanvas");
    const ctx = mainCanvas.getContext("2d");

    const secondVisual = document.getElementById("secondVisual");
    const secondLine = document.getElementById("secondLine");

    const statusRun = document.getElementById("statusRun");
    const statusRhythm = document.getElementById("statusRhythm");
    const statusMeasure = document.getElementById("statusMeasure");
    const statusBeat = document.getElementById("statusBeat");

    // ===== BPMгғ—гғ«гғҖгӮҰгғі =====
    for (let i = 20; i <= 200; i++) {
      const op = document.createElement("option");
      op.value = String(i);
      op.textContent = String(i);
      if (i === 70) op.selected = true;
      bpmSelect.appendChild(op);
    }

    // ===== йҹій–ўйҖЈ =====
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    async function resumeAudio() {
      const ctx = ensureAudio();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
      return ctx;
    }

    function scheduleClick(time, isAccent, isSecond) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";

      // д»ҘеүҚгҒ®зі»зөұгҒ«иҝ‘гҒ„йҹіиүІ
      const freq = isSecond
        ? (isAccent ? 800 : 400)
        : (isAccent ? 1000 : 600);

      const peak = isSecond
        ? (isAccent ? 0.20 : 0.13)
        : (isAccent ? 0.12 : 0.08);

      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(peak, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);

      osc.start(time);
      osc.stop(time + 0.08);
    }

    // ===== еҶҚз”ҹзҠ¶ж…Ӣ =====
    let running = false;
    let rafId = 0;
    let schedulerId = 0;

    let nextMainTime = 0;
    let nextSecondTime = 0;
    let scheduleAhead = 0.12;  // з§’
    let lookaheadMs = 25;

    let mode = "stopped"; // stopped, precount, main

    // main sequence state
    let stepIndex = 0;         // patternеҶ… index
    let measureInStep = 1;     // 1..selectedMeasures
    let beatInBar = 1;         // 1..4
    let mainSubIndex = 0;      // 0..subdivision-1

    let secondSubIndex = 0;    // 0..1
    let precountBeat = 1;      // 1..4

    // иЎЁзӨәз”ЁгҖҢе®ҹйҡӣгҒ«зҷәзҒ«гҒ—гҒҹгҖҚзҠ¶ж…Ӣ
    let activeMain = {
      subdivision: 1,
      subIndex: -1,
      onUntil: 0
    };
    let activeSecond = {
      index: -1,
      onUntil: 0
    };
    let displayState = {
      runningText: "еҒңжӯўдёӯ",
      rhythmText: "з¬¬1: 4еҲҶйҹіз¬Ұ",
      measureText: "1/1е°ҸзҜҖ",
      beatText: "жӢҚ1/4"
    };

    // е…ҲиӘӯгҒҝдәҲзҙ„гҒҜгҒҷгӮӢгҒҢгҖҒиЎЁзӨәгҒҜ time еҲ°йҒ”еҫҢгҒ«гҒ—гҒӢеӨүгҒҲгҒӘгҒ„
    const dueVisualEvents = [];
    const dueStatusEvents = [];

    function getMeasuresPerStep() {
      return parseInt(measureSelect.value, 10);
    }

    function getPatternArray() {
      return PATTERNS[patternSelect.value];
    }

    function getCurrentSubdivision() {
      return getPatternArray()[stepIndex];
    }

    function resetMainState() {
      stepIndex = 0;
      measureInStep = 1;
      beatInBar = 1;
      mainSubIndex = 0;
      secondSubIndex = 0;
    }

    function setStatus(runText, rhythmText, measureText, beatText) {
      displayState.runningText = runText;
      displayState.rhythmText = rhythmText;
      displayState.measureText = measureText;
      displayState.beatText = beatText;

      statusRun.textContent = runText;
      statusRhythm.textContent = rhythmText;
      statusMeasure.textContent = measureText;
      statusBeat.textContent = beatText;
    }

    function advanceMainStepIfNeeded() {
      const measuresPerStep = getMeasuresPerStep();

      beatInBar++;
      if (beatInBar > 4) {
        beatInBar = 1;
        measureInStep++;
        if (measureInStep > measuresPerStep) {
          measureInStep = 1;
          stepIndex++;
          if (stepIndex >= getPatternArray().length) {
            stepIndex = 0;
          }
        }
      }
    }

    function queueMainStatusEvent(time, subdivision, measureNow, measuresPerStep, beatNow) {
      dueStatusEvents.push({
        time,
        runningText: "еҶҚз”ҹдёӯ",
        rhythmText: `з¬¬1: ${RHYTHM_LABEL[subdivision]}`,
        measureText: `${measureNow}/${measuresPerStep}е°ҸзҜҖ`,
        beatText: `жӢҚ${beatNow}/4`
      });
    }

    function queuePrecountStatusEvent(time, beatNow) {
      dueStatusEvents.push({
        time,
        runningText: "еҶҚз”ҹдёӯпјҲгғ—гғӘгӮ«гӮҰгғігғҲпјү",
        rhythmText: "з¬¬1: 4еҲҶйҹіз¬Ұ",
        measureText: `1/1е°ҸзҜҖ`,
        beatText: `жӢҚ${beatNow}/4`
      });
    }

    function schedulePrecountEvents(now) {
      const beatDur = 60 / parseInt(bpmSelect.value, 10);
      while (nextMainTime < now + scheduleAhead && mode === "precount") {
        const beatNow = precountBeat;
        const accent = (beatNow === 1);

        scheduleClick(nextMainTime, accent, false);

        dueVisualEvents.push({
          time: nextMainTime,
          kind: "main",
          subdivision: 1,
          subIndex: 0,
          onUntil: nextMainTime + Math.min(0.12, beatDur * 0.7)
        });

        queuePrecountStatusEvent(nextMainTime, beatNow);

        precountBeat++;
        if (precountBeat > 4) {
          // ж¬ЎгҒҜжң¬з·Ёй–Ӣе§Ӣ
          mode = "main";
          resetMainState();
          nextMainTime += beatDur;
          nextSecondTime = nextMainTime; // жң¬з·Ёй–Ӣе§ӢдҪҚзҪ®гҒ«еҗҲгӮҸгҒӣгӮӢ
          break;
        } else {
          nextMainTime += beatDur;
        }
      }
    }

    function scheduleMainEvents(now) {
      const bpm = parseInt(bpmSelect.value, 10);
      const beatDur = 60 / bpm;
      const secondDur = beatDur / 2;

      while (mode === "main" && (
        nextMainTime < now + scheduleAhead ||
        nextSecondTime < now + scheduleAhead
      )) {
        // е…ҲгҒ«жқҘгӮӢгӮӨгғҷгғігғҲгӮ’й ҶгҒ«еҮҰзҗҶ
        if (nextMainTime <= nextSecondTime) {
          const subdivision = getCurrentSubdivision();
          const subDur = beatDur / subdivision;

          const currentTime = nextMainTime;
          const currentSubIndex = mainSubIndex;
          const currentBeat = beatInBar;
          const currentMeasure = measureInStep;
          const measuresPerStep = getMeasuresPerStep();

          const isBeatHead = (currentSubIndex === 0);
          const isAccent = (currentSubIndex === 0);

          scheduleClick(currentTime, isAccent, false);

          dueVisualEvents.push({
            time: currentTime,
            kind: "main",
            subdivision,
            subIndex: currentSubIndex,
            onUntil: currentTime + Math.min(0.10, subDur * 0.75)
          });

          if (isBeatHead) {
            queueMainStatusEvent(
              currentTime,
              subdivision,
              currentMeasure,
              measuresPerStep,
              currentBeat
            );
          }

          mainSubIndex++;
          if (mainSubIndex >= subdivision) {
            mainSubIndex = 0;
            advanceMainStepIfNeeded();
          }

          nextMainTime += subDur;
        } else {
          const currentTime = nextSecondTime;
          const idx = secondSubIndex; // 0=еҸі(BD), 1=е·Ұ(HH)
          const isAccent = (idx === 0);

          scheduleClick(currentTime, isAccent, true);

          dueVisualEvents.push({
            time: currentTime,
            kind: "second",
            secondIndex: idx,
            onUntil: currentTime + Math.min(0.10, secondDur * 0.8)
          });

          secondSubIndex = (secondSubIndex + 1) % 2;
          nextSecondTime += secondDur;
        }
      }
    }

    function processDueEvents(now) {
      // visual
      while (dueVisualEvents.length && dueVisualEvents[0].time <= now) {
        const ev = dueVisualEvents.shift();
        if (ev.kind === "main") {
          activeMain.subdivision = ev.subdivision;
          activeMain.subIndex = ev.subIndex;
          activeMain.onUntil = ev.onUntil;
        } else if (ev.kind === "second") {
          activeSecond.index = ev.secondIndex;
          activeSecond.onUntil = ev.onUntil;
        }
      }

      // status
      while (dueStatusEvents.length && dueStatusEvents[0].time <= now) {
        const ev = dueStatusEvents.shift();
        setStatus(ev.runningText, ev.rhythmText, ev.measureText, ev.beatText);
      }

      if (activeMain.onUntil <= now) {
        activeMain.subIndex = -1;
      }
      if (activeSecond.onUntil <= now) {
        activeSecond.index = -1;
      }
    }

    function schedulerLoop() {
      if (!running || !audioCtx) return;
      const now = audioCtx.currentTime;

      if (mode === "precount") {
        schedulePrecountEvents(now);
      }
      if (mode === "main") {
        scheduleMainEvents(now);
      }
    }

    // ===== жҸҸз”» =====
    function drawClockFace() {
      const w = mainCanvas.width;
      const h = mainCanvas.height;
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const radius = 104;

      // еӨ–е‘ЁгғӘгғігӮ°
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 18, 0, Math.PI * 2);
      ctx.strokeStyle = "#303030";
      ctx.lineWidth = 2;
      ctx.stroke();

      // дёӯеҝғ
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = "#888";
      ctx.fill();

      const subdivision = activeMain.subdivision || 1;
      const angles = CLOCK_ANGLES[subdivision];

      // еҖҷиЈңдҪҚзҪ®гӮ’и–„гҒ„гӮ°гғ¬гғј
      for (let i = 0; i < angles.length; i++) {
        const rad = angles[i] * Math.PI / 180;
        const x = cx + Math.cos(rad) * radius;
        const y = cy + Math.sin(rad) * radius;

        // дёӯеҝғгҒӢгӮүгҒ®и–„гҒ„з·ҡ
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // зӮ№
        const isActive = (i === activeMain.subIndex);
        ctx.beginPath();
        ctx.arc(x, y, 13, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "#35ff7a" : "#5a5a5a";
        ctx.shadowColor = isActive ? "#35ff7a" : "transparent";
        ctx.shadowBlur = isActive ? 18 : 0;
        ctx.fill();

        // еҶ…еҒҙгғҸгӮӨгғ©гӮӨгғҲ
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "rgba(255,255,255,0.75)" : "rgba(255,255,255,0.08)";
        ctx.fill();
      }

      // 12жҷӮгғһгғјгӮҜ
      ctx.beginPath();
      ctx.arc(cx, cy - (radius + 18), 3, 0, Math.PI * 2);
      ctx.fillStyle = "#c8c8c8";
      ctx.fill();
    }

    function drawSecondLine() {
      const boxWidth = secondVisual.clientWidth;
      const pad = 12;
      const rightX = boxWidth - pad - secondLine.offsetWidth;
      const leftX = pad;

      let x = leftX;
      if (activeSecond.index === 0) {
        x = rightX; // еҘҮж•°еӣһ=еҸіз«Ҝ=BD
      } else if (activeSecond.index === 1) {
        x = leftX;  // еҒ¶ж•°еӣһ=е·Ұз«Ҝ=HH
      } else {
        // йқһзӮ№зҒҜжҷӮгҒҜеүҚеӣһдҪҚзҪ®з¶ӯжҢҒ
        const prev = parseFloat(secondLine.dataset.x || String(leftX));
        x = Number.isFinite(prev) ? prev : leftX;
      }

      secondLine.style.left = `${x}px`;
      secondLine.dataset.x = String(x);
      secondLine.style.opacity = activeSecond.index === -1 ? "0.35" : "1";
    }

    function renderLoop() {
      if (!running || !audioCtx) return;
      const now = audioCtx.currentTime;

      processDueEvents(now);
      drawClockFace();
      drawSecondLine();

      rafId = requestAnimationFrame(renderLoop);
    }

    // ===== й–Ӣе§Ӣ/еҒңжӯў =====
    async function start() {
      await resumeAudio();

      stop(true);

      running = true;
      mode = "precount";
      precountBeat = 1;
      resetMainState();

      const now = audioCtx.currentTime;
      const startLead = 0.08;
      nextMainTime = now + startLead;
      nextSecondTime = now + startLead;

      dueVisualEvents.length = 0;
      dueStatusEvents.length = 0;

      activeMain = { subdivision: 1, subIndex: -1, onUntil: 0 };
      activeSecond = { index: -1, onUntil: 0 };

      setStatus("еҶҚз”ҹдёӯпјҲгғ—гғӘгӮ«гӮҰгғігғҲпјү", "з¬¬1: 4еҲҶйҹіз¬Ұ", "1/1е°ҸзҜҖ", "жӢҚ1/4");

      schedulerId = setInterval(schedulerLoop, lookaheadMs);
      schedulerLoop();
      renderLoop();
    }

    function stop(silent = false) {
      running = false;
      mode = "stopped";

      if (schedulerId) {
        clearInterval(schedulerId);
        schedulerId = 0;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }

      dueVisualEvents.length = 0;
      dueStatusEvents.length = 0;

      activeMain = {
        subdivision: getPatternArray()[0],
        subIndex: -1,
        onUntil: 0
      };
      activeSecond = {
        index: -1,
        onUntil: 0
      };

      drawClockFace();
      drawSecondLine();

      if (!silent) {
        setStatus(
          "еҒңжӯўдёӯ",
          `з¬¬1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}е°ҸзҜҖ`,
          "жӢҚ1/4"
        );
      }
    }

    // ===== гӮӨгғҷгғігғҲ =====
    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", () => stop(false));

    patternSelect.addEventListener("change", () => {
      if (!running) {
        activeMain.subdivision = getPatternArray()[0];
        activeMain.subIndex = -1;
        drawClockFace();
        setStatus(
          "еҒңжӯўдёӯ",
          `з¬¬1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}е°ҸзҜҖ`,
          "жӢҚ1/4"
        );
      }
    });

    measureSelect.addEventListener("change", () => {
      if (!running) {
        setStatus(
          "еҒңжӯўдёӯ",
          `з¬¬1: ${RHYTHM_LABEL[getPatternArray()[0]]}`,
          `1/${getMeasuresPerStep()}е°ҸзҜҖ`,
          "жӢҚ1/4"
        );
      }
    });

    bpmSelect.addEventListener("change", () => {
      // еҒңжӯўдёӯгҒҜдҪ•гӮӮгҒ—гҒӘгҒ„гҖӮеҶҚгӮ№гӮҝгғјгғҲжҷӮгҒ«еҸҚжҳ гҖӮ
    });

    window.addEventListener("resize", () => {
      drawClockFace();
      drawSecondLine();
    });

    // еҲқжңҹиЎЁзӨә
    activeMain.subdivision = getPatternArray()[0];
    drawClockFace();
    drawSecondLine();
    setStatus("еҒңжӯўдёӯ", "з¬¬1: 4еҲҶйҹіз¬Ұ", "1/1е°ҸзҜҖ", "жӢҚ1/4");
  </script>
</body>
