<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Metronome</title>

<style>
:root{
  --bg:#111;
  --panel:#202020;
  --text:#f4f4f4;
  --active-main:#35ff7a;
  --active-second:#ff4d4d;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system, sans-serif;
  display:flex;
  justify-content:center;
}

.wrap{
  width:100%;
  max-width:600px;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* メトロノーム */
canvas{
  width:96vw;
  height:96vw;
  max-width:520px;
  max-height:520px;
  display:block;
  margin:auto;
  background:#161616;
  border-radius:20px;
}

/* ステータス */
.status{
  text-align:center;
  padding:10px;
  font-weight:700;
  line-height:1.8;
}

.status div{
  font-size:1.2rem;   /* ←さらに拡大 */
}

/* ボタン */
.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:16px;
  font-size:1.05rem;
  font-weight:800;
  border:none;
  border-radius:12px;
}

#startBtn{background:#2a4d31;}
#stopBtn{background:#4a2d2d;}

/* 設定 */
.control{
  background:var(--panel);
  padding:10px;
  border-radius:12px;
}

label{
  font-size:0.9rem;
}

select{
  width:100%;
  padding:10px;
  margin-top:4px;
  border-radius:10px;
  background:#2b2b2b;
  color:#fff;
  border:none;
}
</style>
</head>

<body>
<div class="wrap">

<canvas id="canvas" width="520" height="520"></canvas>

<div class="status">
  <div id="rhythm">4分音符</div>
  <div id="measure">1/1小節</div>
  <div id="beat">拍1/4</div>
</div>

<div class="buttons">
  <button id="startBtn">スタート</button>
  <button id="stopBtn">ストップ</button>
</div>

<div class="control">
  <label>ハンドパターン</label>
  <select id="pattern">
    <option value="1">パターン1</option>
    <option value="2">パターン2</option>
    <option value="3">3連→6連</option>
    <option value="4">3連のみ</option>
  </select>

  <label>小節数</label>
  <select id="measureSel">
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>8</option>
  </select>

  <label>BPM</label>
  <select id="bpm"></select>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

for(let i=20;i<=200;i++){
  bpm.add(new Option(i,i,i===70,i===70));
}

/* ===== 描画 ===== */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx=260, cy=260;
  const R=200;  // ←さらに大きく

  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle="#333";
  ctx.stroke();
}

/* ===== 簡易ループ ===== */
let running=false;
function loop(){
  if(!running)return;
  draw();
  requestAnimationFrame(loop);
}

startBtn.onclick=()=>{
  running=true;
  loop();
}

stopBtn.onclick=()=>{
  running=false;
}

draw();
</script>
</body>
</html>
